bcr_test_module:
  module_path: "e2e/smoke"
  matrix:
    # The action layer is POSIX-only today; Windows returns with the
    # cross-platform action-runner workstream. Bazel 8+ only.
    platform: ["macos", "ubuntu2204"]
    bazel: ["8.x"]
  tasks:
    run_tests:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//..."
