name: Update Flutter versions

# Refresh flutter/private/versions.bzl with the latest stable Flutter releases
# and open a PR when anything changed. Runs on the 1st of each month; can also
# be triggered manually (optionally pinning explicit versions).
on:
  schedule:
    # 06:00 UTC on the 1st of every month.
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      versions:
        description: "Optional space-separated versions to pin (blank = auto-detect latest stable)."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh versions.bzl
        # Mirrors `bazel run //tools:update_flutter_versions`. The script is
        # self-contained (curl/jq/python3), so we invoke it directly to avoid
        # spinning up Bazel just to write a source file.
        env:
          # Via env (not direct ${{ }} interpolation into the shell) to avoid
          # script injection from the dispatch input; word-split intentionally.
          VERSIONS: ${{ github.event.inputs.versions }}
        run: |
          chmod +x scripts/update_flutter_versions.sh
          # shellcheck disable=SC2086
          ./scripts/update_flutter_versions.sh $VERSIONS

      - name: Reject placeholder hashes
        # Defense in depth: the script omits platforms with no published
        # archive, so a placeholder sha256-AAAA…= should never appear. If one
        # does, fail before opening a PR rather than shipping a broken table.
        run: |
          if grep -q "sha256-AAAA" flutter/private/versions.bzl; then
            echo "::error::versions.bzl contains placeholder hashes; refusing to open a PR." >&2
            grep -n "sha256-AAAA" flutter/private/versions.bzl >&2
            exit 1
          fi

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- flutter/private/versions.bzl; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- flutter/private/versions.bzl
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(flutter): refresh Flutter SDK version table"
          title: "chore(flutter): refresh Flutter SDK version table"
          body: |
            Automated monthly refresh of `flutter/private/versions.bzl` with the
            latest stable Flutter releases and their SRI integrity hashes.

            Generated by `.github/workflows/update-flutter-versions.yaml`
            (mirrors `bazel run //tools:update_flutter_versions`).

            Review the diff, confirm no placeholder `sha256-AAAA…=` hashes leaked
            in, then merge.
          branch: chore/update-flutter-versions
          delete-branch: true
          add-paths: |
            flutter/private/versions.bzl
