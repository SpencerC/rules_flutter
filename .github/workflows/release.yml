# Cut a release whenever a new tag is pushed to the repo.
name: Release

on:
  # Can be triggered from the tag.yaml workflow
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  # Or, developers can manually push a tag from their clone
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # upload release files
  id-token: write # attest provenance
  attestations: write # attest provenance

jobs:
  release:
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@1d798ff015ed0696433e01e2c3ccbb2abefadad7 # 2026-06-10
    with:
      release_files: rules_flutter-*.tar.gz
      tag_name: ${{ inputs.tag_name }}
