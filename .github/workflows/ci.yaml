name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  # Cancel previous actions from the same PR or branch except 'main' branch.
  # See https://docs.github.com/en/actions/using-jobs/using-concurrency and https://docs.github.com/en/actions/learn-github-actions/contexts for more info.
  group: concurrency-group::${{ github.workflow }}::${{ github.event.pull_request.number > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}${{ github.ref_name == 'main' && format('::{0}', github.run_id) || ''}}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  test:
    uses: bazel-contrib/.github/.github/workflows/bazel.yaml@v7.2.3
    with:
      folders: |
        [
          ".",
          "gazelle",
          "e2e/smoke"
        ]
      exclude: |
        [
          {"folder": ".", "bzlmodEnabled": false},
          {"folder": "gazelle", "bzlmodEnabled": false},
          {"folder": "e2e/smoke", "bzlmodEnabled": false}
        ]
      exclude_windows: true
  # The standalone example consumes rules_flutter as a plain bazel_dep; in-repo
  # CI overrides it with the working tree. After the first BCR release, a
  # no-override leg is added as the "did the release actually publish" canary.
  example:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Test the example against the working tree
        working-directory: examples/hello_world
        run: |
          bazel test --override_module=rules_flutter=$GITHUB_WORKSPACE //...
          bazel build --override_module=rules_flutter=$GITHUB_WORKSPACE //:app.web
  # bazel_compatibility declares ">=8.0.0"; exercise the floor, not just the
  # .bazelversion pin.
  bazel-floor:
    runs-on: ubuntu-24.04
    env:
      USE_BAZEL_VERSION: 8.0.0
    steps:
      - uses: actions/checkout@v4
      # //docs staleness goldens are rendered by the pinned .bazelversion's
      # stardoc; older stardoc renders tag-class attrs differently, so the
      # docs gate is excluded from the floor leg.
      - name: Root module tests at the minimum supported Bazel
        run: bazel test //... -- -//docs/...
      - name: Example at the minimum supported Bazel
        working-directory: examples/hello_world
        run: bazel test --override_module=rules_flutter=$GITHUB_WORKSPACE //...
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pre-commit/action@v3.0.1
  # For branch protection settings, this job provides a "stable" name that can be used to gate PR merges
  # on "all matrix jobs were successful".
  conclusion:
    needs: [test, example, bazel-floor, pre-commit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5 # v3.0.3

      # Note: possible conclusion values:
      # https://github.com/technote-space/workflow-conclusion-action/blob/main/src/constant.ts
      - name: report success
        if: ${{ env.WORKFLOW_CONCLUSION == 'success' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 0

      - name: report failure
        if: ${{ env.WORKFLOW_CONCLUSION == 'failure' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 1
