name: Feature request
description: Suggest a capability or improvement for rules_flutter.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that rules_flutter doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        What would the API or behavior look like? A sketch of the BUILD/MODULE
        usage you'd expect is helpful.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you weighed.
    validations:
      required: false
