name: codegen_app
description: Exercises hermetic in-action build_runner code generation.
publish_to: "none"
version: 1.0.0+1

environment:
  flutter: ">=3.24.0"
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  copy_with_extension: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: any
  copy_with_extension_gen: any
  flutter_gen_runner: any

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_gen:
  output: lib/generated/
