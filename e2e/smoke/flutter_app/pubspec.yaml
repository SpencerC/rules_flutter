name: hello_world
description: A simple Flutter hello world app for testing

version: 1.0.0+1

environment:
  flutter: ">=3.24.0"
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  fixnum: ^1.1.0
  protobuf: 3.1.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  intl_utils: ^2.8.7

dependency_overrides:
  # Align with codegen_app: the pub module extension requires a single version
  # per package across all pub_deps.json files, and build_runner 2.4.x needs
  # dart_style 2.x.
  dart_style: 2.3.7

flutter:
  uses-material-design: true

flutter_intl:
  enabled: true
  arb_dir: l10n
  output_dir: lib/generated
